name: Build Cross-Platform Desktop Apps (Windows, macOS, Linux)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: DatDaiDesktop-Windows
            archive_file: DatDaiDesktop-Windows.zip
          - os: macos-latest
            artifact_name: DatDaiDesktop-macOS
            archive_file: DatDaiDesktop-macOS.zip
          - os: ubuntu-latest
            artifact_name: DatDaiDesktop-Linux
            archive_file: DatDaiDesktop-Linux.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Desktop Application with PyInstaller
        run: |
          pyinstaller --clean -y dat_dai_desktop.spec

      - name: Compress build artifacts
        run: |
          python scripts/package_artifact.py ${{ matrix.artifact_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_file }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Release Packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Pre-Release' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          draft: false
          files: |
            DatDaiDesktop-Windows/DatDaiDesktop-Windows.zip
            DatDaiDesktop-macOS/DatDaiDesktop-macOS.zip
            DatDaiDesktop-Linux/DatDaiDesktop-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
