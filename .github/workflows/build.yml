name: Build Cross-Platform Desktop Apps (Windows, macOS, Linux)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: DatDaiDesktop-Windows
            archive_name: DatDaiDesktop-Windows.zip
          - os: macos-latest
            artifact_name: DatDaiDesktop-macOS
            archive_name: DatDaiDesktop-macOS.zip
          - os: ubuntu-latest
            artifact_name: DatDaiDesktop-Linux
            archive_name: DatDaiDesktop-Linux.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build Desktop Application with PyInstaller
        run: |
          pyinstaller --clean -y dat_dai_desktop.spec

      - name: Compress artifacts (Cross-Platform Python script)
        run: |
          python -c "
          import shutil, sys, os
          archive_base = '${{ matrix.artifact_name }}'
          dist_dir = os.path.join('dist', 'DatDaiDesktop')
          if os.path.exists(dist_dir):
              shutil.make_archive(archive_base, 'zip', root_dir='dist', base_dir='DatDaiDesktop')
              print(f'Successfully created {archive_base}.zip')
          else:
              print(f'Error: {dist_dir} does not exist!')
              sys.exit(1)
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Release Packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DatDaiDesktop-Windows/DatDaiDesktop-Windows.zip
            DatDaiDesktop-macOS/DatDaiDesktop-macOS.zip
            DatDaiDesktop-Linux/DatDaiDesktop-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
